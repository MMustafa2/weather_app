<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    width:350px;
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
    color:#333;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.weather-icon{
    font-size:60px;
    margin:10px 0;
}

.temp{
    font-size:40px;
    font-weight:bold;
    color:#333;
}

.city{
    font-size:24px;
    margin-top:10px;
    color:#555;
}

.details{
    display:flex;
    justify-content:space-around;
    margin-top:20px;
}

.detail-card{
    background:#f4f4f4;
    padding:10px;
    border-radius:10px;
    width:45%;
}
</style>
</head>
<body>

<div class="container">

    <h1>Weather App</h1>

    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter City">
        <button onclick="searchWeather()">Search</button>
    </div>

    <div class="weather-icon">☀️</div>

    <div class="temp" id="temp">32°C</div>

    <div class="city" id="city">Lahore</div>

    <div class="details">
        <div class="detail-card">
            <h3>Humidity</h3>
            <p id="humidity">65%</p>
        </div>

        <div class="detail-card">
            <h3>Wind</h3>
            <p id="wind">12 km/h</p>
        </div>
    </div>

</div>

<script>
function searchWeather(){

    let city = document.getElementById("cityInput").value;

    if(city.trim() === ""){
        alert("Please enter a city name");
        return;
    }

    document.getElementById("city").innerText = city;

    let randomTemp = Math.floor(Math.random()*15)+20;
    let randomHumidity = Math.floor(Math.random()*40)+40;
    let randomWind = Math.floor(Math.random()*20)+5;

    document.getElementById("temp").innerText =
        randomTemp + "°C";

    document.getElementById("humidity").innerText =
        randomHumidity + "%";

    document.getElementById("wind").innerText =
        randomWind + " km/h";
}
</script>

</body>
</html>
